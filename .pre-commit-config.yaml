repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # Tabs -> spaces, strip CRLF
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: remove-tabs
      - id: remove-crlf

  # Ruff: lint + format (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # ty type checker (no upstream pre-commit repo yet — run via uv to use the
  # version pinned in pyproject.toml's dev group)
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run --group dev ty check
        language: system
        types: [python]
        pass_filenames: false

  # clang-format for C/C++/CUDA
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]
        exclude: |
          (?x)^(jitcu/data/include/jitcu/dbg.h)$
