name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - name: Verify tag matches pyproject version
        # Only when triggered by a tag push: tag v1.2.3 must match pyproject 1.2.3
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(uv run python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME -> $tag_version does not match pyproject version $pyproject_version"
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Show built artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on tag pushes, not manual workflow_dispatch runs
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/jitcu
    permissions:
      # OIDC token for PyPI Trusted Publishing — no API token in secrets needed
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
